<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
    <title>Drag and Drop</title>
</head>
<body>
    <div class="input">
        <h2>Add Text</h2>
        <div class="data">
            <input type="text" id="inp" placeholder="Write something...">
            <button id="btn">Add</button>
        </div>
    </div>
    <div class="list">
        <div class="box" id="box1">
            <h2>Box 1</h2>
        </div>
        <div class="box" id="box2">
            <h2>Box 2</h2>
        </div>
        <div class="box" id="box3">
            <h2>Box 3</h2>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
